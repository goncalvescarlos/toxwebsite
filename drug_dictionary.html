<script>
const container = document.getElementById("dictionary");
const searchInput = document.getElementById("searchInput");

function render(filter = "") {
  container.innerHTML = "";

  let foundAny = false;

  drugs.forEach(category => {
    let section = document.createElement("section");
    section.className = "dictionary-section";

    let title = document.createElement("h2");
    title.textContent = category.category;

    let hasResults = false;

    category.items.forEach(drug => {
      let text = (drug.name + " " + drug.description).toLowerCase();

      if (filter && !text.includes(filter.toLowerCase())) return;

      hasResults = true;
      foundAny = true;

      let details = document.createElement("details");
      details.className = "drug";

      let summary = document.createElement("summary");
      summary.textContent = drug.name;

      let desc = document.createElement("p");
      desc.textContent = drug.description;

      details.appendChild(summary);
      details.appendChild(desc);
      section.appendChild(details);
    });

    if (hasResults) {
      section.prepend(title);
      container.appendChild(section);
    }
  });

  // 🔥 Show message if nothing found
  if (!foundAny) {
    container.innerHTML = "<p style='text-align:center;'>No results found</p>";
  }
}

// Live search
searchInput.addEventListener("keyup", () => {
  render(searchInput.value.trim());
});

// Initial load
render();
</script>

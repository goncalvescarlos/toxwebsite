<script>
const req = new URLSearchParams(window.location.search).get("req");

const rows = {
  targeted: [],
  untargeted: []
};

window.addEventListener("DOMContentLoaded", async () => {
  if (!req) {
    showError("targeted", "Missing req in URL");
    showError("untargeted", "Missing req in URL");
    return;
  }

  try {
    // STEP 1: get all files for this req
    const res = await fetch(`http://127.0.0.1:5000/api/files-by-req?req=${req}`);
    const files = await res.json();

    if (!files.length) {
      showError("targeted", "No files found");
      showError("untargeted", "No files found");
      return;
    }

    // STEP 2: fetch each file using record_id
    for (const f of files) {
      const fileRes = await fetch(
        `http://127.0.0.1:5000/api/get-file?id=${f.record_id}&source=${f.source}`
      );

      const csv = await fileRes.text();
      parseCSV(csv, f.source);
    }

  } catch (err) {
    console.error(err);
    showError("targeted", "Error loading data");
    showError("untargeted", "Error loading data");
  }
});


// =========================
// PARSE CSV
// =========================
function parseCSV(csv, source) {
  const tableBody = document.getElementById(`${source}Body`);
  tableBody.innerHTML = "";
  rows[source] = [];

  const allRows = csv.replace(/\r/g, "").split("\n").filter(Boolean);

  if (allRows.length < 2) {
    setTableMessage(source, "No data");
    return;
  }

  const headers = allRows[0].split(",");
  const values  = allRows[1].split(",");

  let added = 0;

  for (let i = 2; i + 1 < headers.length; i += 2) {
    const drug = headers[i]?.trim();
    const concentration = values[i]?.trim();
    const result = values[i + 1]?.trim();

    if (!drug || !concentration || !result) continue;
    if (result.toLowerCase() !== "pass") continue;

    rows[source].push({ drug, concentration });

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${drug}</td>
      <td>${concentration}</td>
      <td><button class="delete-btn" onclick="deleteRow(this, '${drug}', '${source}')">🗑</button></td>
    `;

    tableBody.appendChild(tr);
    added++;
  }

  if (added === 0) {
    setTableMessage(source, "No passing results");
  }
}


// =========================
// DELETE
// =========================
function deleteRow(btn, drug, source) {
  if (!confirm(`Remove ${drug}?`)) return;
  btn.closest("tr").remove();
  rows[source] = rows[source].filter(r => r.drug !== drug);
}


// =========================
// PDF
// =========================
function submitReport() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y = 10;
  doc.text(`Requisition: ${req}`, 10, y);
  y += 10;

  ["targeted", "untargeted"].forEach(source => {
    if (!rows[source].length) return;

    doc.text(source.toUpperCase(), 10, y);
    y += 8;

    rows[source].forEach(r => {
      doc.text(`${r.drug}: ${r.concentration}`, 10, y);
      y += 6;
    });

    y += 6;
  });

  doc.save(`report_${req}.pdf`);
}


// =========================
// HELPERS
// =========================
function showError(source, msg) {
  const el = document.getElementById(`${source}Error`);
  el.textContent = msg;
  el.style.display = "block";
}

function setTableMessage(source, msg) {
  const tbody = document.getElementById(`${source}Body`);
  tbody.innerHTML = `<tr><td colspan="3">${msg}</td></tr>`;
}
</script>

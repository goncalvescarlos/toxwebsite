<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>View Results - iC42 Toxicology</title>
<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f5f5f5;
}

.navbar {
  background: #000;
  color: #fff;
  padding: 15px 30px;
  display: flex;
  justify-content: space-between;
}

.container {
  max-width: 1100px;
  margin: 40px auto;
}

h2 { margin-bottom: 20px; }

table {
  width: 100%;
  border-collapse: collapse;
  background: #fff;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #ddd;
}

th {
  background: #eee;
  text-align: left;
}

tr:hover {
  background: #f9f9f9;
}

.section { margin-bottom: 40px; }

.section-title {
  font-weight: bold;
  margin-bottom: 10px;
}

.delete-btn {
  cursor: pointer;
  color: red;
  font-weight: bold;
}

.submit-btn {
  background: #28a745;
  color: white;
  padding: 10px 20px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}
</style>

</head>

<body>

<header>
  <nav class="navbar">
    <h2>iC42 Toxicology</h2>
    <div>
      <a href="backend.html" style="color:white;">Home</a>
      <a href="login.html" style="color:white; margin-left:10px;">Logout</a>
    </div>
  </nav>
</header>

<section class="home-bar">
  <div class="container">
    <a href="results_approval.html">← Back to Results Approval</a>
  </div>
</section>

<div class="container">

<h2>Approve Result (Req: <span id="reqLabel"></span>)</h2>

<!-- TARGETED -->

<div class="section">
  <div class="section-title">Targeted</div>
  <table>
    <thead>
      <tr>
        <th>Drug</th>
        <th>Value</th>
        <th>Delete</th>
      </tr>
    </thead>
    <tbody id="targetedBody"></tbody>
  </table>
</div>

<!-- UNTARGETED -->

<div class="section">
  <div class="section-title">Untargeted</div>
  <table>
    <thead>
      <tr>
        <th>Drug</th>
        <th>Value</th>
        <th>Delete</th>
      </tr>
    </thead>
    <tbody id="untargetedBody"></tbody>
  </table>
</div>

<div style="text-align:center;">
  <button class="submit-btn" onclick="submitReport()">Submit Report</button>
</div>

</div>

<script>
const req = new URLSearchParams(window.location.search).get("req");
document.getElementById("reqLabel").textContent = req;

const rows = { targeted: [], untargeted: [] };


// =========================
// LOAD FILES
// =========================
async function loadFiles() {
  try {
    const res = await fetch(`http://127.0.0.1:5000/api/files-by-req?req=${req}`);
    const files = await res.json();

    console.log("FILES:", files);

    for (const f of files) {
      const fileRes = await fetch(
        `http://127.0.0.1:5000/api/get-file?id=${f.record_id}&source=${f.source}`
      );

      const csv = await fileRes.text();
      parseCSV(csv, f.source);
    }

  } catch (err) {
    console.error("LOAD ERROR:", err);
  }
}


// =========================
// ROUTER
// =========================
function parseCSV(csv, source) {
  if (source === "targeted") {
    parseTargeted(csv);
  } else {
    parseUntargeted(csv);
  }
}


// =========================
// TARGETED
// =========================
function parseTargeted(csv) {
  const table = document.getElementById("targetedBody");

  const lines = csv.replace(/\r/g, "").split("\n").filter(Boolean);
  if (lines.length < 2) return;

  const headers = lines[0].split(",");
  const values = lines[1].split(",");

  for (let i = 2; i < headers.length; i += 2) {
    const drug = headers[i]?.trim();
    const val = values[i]?.trim();
    const result = values[i + 1]?.trim();

    if (!drug || !val || !result) continue;
    if (result.toLowerCase() !== "pass") continue;

    addTableRow("targeted", drug, val);
  }

  if (table.innerHTML === "") {
    table.innerHTML = "<tr><td colspan='3'>No passing results</td></tr>";
  }
}


// =========================
// UNTARGETED (Column D + last column)
// =========================
function parseUntargeted(csv) {
  const table = document.getElementById("untargetedBody");

  const lines = csv.replace(/\r/g, "").split("\n").filter(Boolean);
  if (lines.length < 2) return;

  for (let r = 1; r < lines.length; r++) {
    const cols = lines[r].split(",");

    const drug = cols[3]?.trim();
    const val = cols[cols.length - 1]?.trim();

    if (!drug || !val) continue;
    if (val === "0" || val === "" || val.toLowerCase() === "nan") continue;

    addTableRow("untargeted", drug, val);
  }

  if (table.innerHTML === "") {
    table.innerHTML = "<tr><td colspan='3'>No results</td></tr>";
  }
}


// =========================
// SAFE ROW BUILDER (RENAMED → avoids your bug)
// =========================
function addTableRow(source, drug, val) {
  const table = document.getElementById(source + "Body");

  rows[source].push({ drug, val });

  const tr = document.createElement("tr");
  tr.innerHTML = `
    <td>${drug}</td>
    <td>${val}</td>
    <td><span class="delete-btn" onclick="deleteRow(this, '${drug}', '${source}')">🗑</span></td>
  `;

  table.appendChild(tr);
}


// =========================
// DELETE
// =========================
function deleteRow(el, drug, source) {
  el.closest("tr").remove();
  rows[source] = rows[source].filter(r => r.drug !== drug);
}


// =========================
// PDF
// =========================
async function submitReport() {
  if (!confirm("Submit and upload report?")) return;

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y = 10;
  doc.text(`Requisition: ${req}`, 10, y);
  y += 10;

  ["targeted", "untargeted"].forEach(source => {
    if (!rows[source].length) return;

    doc.text(source.toUpperCase(), 10, y);
    y += 8;

    rows[source].forEach(r => {
      doc.text(`${r.drug}: ${r.val}`, 10, y);
      y += 6;
    });

    y += 6;
  });

  // ✅ Download locally
  doc.save(`report_${req}.pdf`);

  // ✅ Upload to backend
  const blob = doc.output("blob");

  const formData = new FormData();
  formData.append("file", blob, `report_${req}.pdf`);
  formData.append("req", req);

  const res = await fetch("http://127.0.0.1:5000/api/upload-report", {
    method: "POST",
    body: formData
  });

  const result = await res.json();

  if (result.error) {
    alert("Upload failed: " + result.error);
  } else {
    alert("Report uploaded to REDCap!");
  }
}

// INIT
loadFiles();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>File Viewer - iC42 Toxicology</title>
<link rel="stylesheet" href="style.css">

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;<script>
const params = new URLSearchParams(window.location.search);
const req = params.get("req");

let currentRows = [];

async function loadFiles() {
  const res = await fetch(`http://127.0.0.1:5000/api/files-by-req?req=${req}`);
  const files = await res.json();

  for (const f of files) {
    const fileRes = await fetch(
      `http://127.0.0.1:5000/api/get-file?id=${f.record_id}&source=${f.source}`
    );

    const text = await fileRes.text();

    if (f.source === "targeted") {
      parseCSV(text, "targetedBody");
    } else {
      parseCSV(text, "untargetedBody");
    }
  }
}

function parseCSV(csv, tableId) {
  const rows = csv.replace(/\r/g, "").split("\n");

  const header = rows[0].split(",");
  const values = rows[1].split(",");

  const table = document.getElementById(tableId);

  for (let i = 2; i < header.length; i += 2) {
    const drug = header[i]?.trim();
    const concentration = values[i]?.trim();
    const result = values[i + 1]?.trim();

    if (!drug || !concentration || !result) continue;
    if (result.toLowerCase() !== "pass") continue;

    currentRows.push({ drug, concentration });

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${drug}</td>
      <td>${concentration}</td>
    `;

    table.appendChild(tr);
  }
}

loadFiles();
</script>

  background: white;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #ddd;
}

th {
  background: #f5f5f5;
  text-align: left;
}

tr:hover {
  background: #f9f9f9;
}

.delete-btn {
  cursor: pointer;
  color: red;
  font-weight: bold;
  font-size: 18px;
}

.delete-btn:hover {
  opacity: 0.7;
}

.submit-btn {
  background: #28a745;
  color: white;
  padding: 10px 20px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<header>
  <nav class="navbar">
    <h2 class="logo">iC42 Toxicology</h2>
  </nav>
</header>

<!-- BACK LINK -->
<section class="home-bar">
  <div class="container">
    <a href="results_approval.html">← Back to Results</a>
  </div>
</section>

<main class="container">

<h2>rug Results</h2>

<table>
  <thead>
    <tr>
      <th>Drug</th>
      <th>Value</th>
      <th>Delete</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<div style="text-align:center; margin-top: 20px;">
  <button class="submit-btn" onclick="submitReport()">
    Submit Report
  </button>
</div>

</main>

<script>
const urlParams = new URLSearchParams(window.location.search);
const recordId = urlParams.get("id");

let currentRows = []; // store rows for PDF

// =========================
// LOAD FILE FROM BACKEND
// =========================
async function loadFile() {
  if (!recordId) {
    alert("Missing record ID");
    return;
  }

  try {
    const res = await fetch(`http://127.0.0.1:5000/api/get-file?id=${recordId}`);

    if (!res.ok) {
      throw new Error("Failed to fetch file");
    }

    const text = await res.text();
    parseCSV(text);

  } catch (err) {
    console.error(err);
    alert("Error loading file");
  }
}

// =========================
// PARSE CSV
// =========================
function parseCSV(csv) {
  const rows = csv.replace(/\r/g, "").split("\n");

  if (rows.length < 2) return;

  const header = rows[0].split(",");
  const values = rows[1].split(",");

  const table = document.getElementById("tableBody");
  table.innerHTML = "";
  currentRows = [];

  for (let i = 2; i < header.length; i += 2) {

    const drug = header[i]?.trim();
    const concentration = values[i]?.trim();
    const result = values[i + 1]?.trim();

    if (!drug || !concentration || !result) continue;

    // ONLY PASS
    if (result.toLowerCase() !== "pass") continue;

    currentRows.push({ drug, concentration });

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${drug}</td>
      <td>${concentration}</td>
      <td><span class="delete-btn" onclick="deleteRow(this)">🗑</span></td>
    `;

    table.appendChild(tr);
  }

  if (table.innerHTML === "") {
    table.innerHTML = "<tr><td colspan='3'>No passing results</td></tr>";
  }
}

// =========================
// DELETE ROW
// =========================
function deleteRow(el) {
  if (!confirm("Remove this row?")) return;
  el.closest("tr").remove();
}

// =========================
// GENERATE PDF + SUBMIT
// =========================
function submitReport() {
  if (!confirm("Submit this report?")) return;

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y = 10;

  doc.text(`Requisition ID: ${recordId}`, 10, y);
  y += 10;

  currentRows.forEach(row => {
    doc.text(`${row.drug}: ${row.concentration}`, 10, y);
    y += 8;
  });

  doc.save(`report_${recordId}.pdf`);

  alert("PDF generated (upload step comes next)");
}

// INIT
loadFile();
</script>

</body>
</html>

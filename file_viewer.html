<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>View Results - iC42 Toxicology</title>
<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; margin:0; background:#f5f5f5; }
.navbar { background:#000; color:#fff; padding:15px 30px; display:flex; justify-content:space-between; }
.container { max-width:1100px; margin:40px auto; }
table { width:100%; border-collapse:collapse; background:#fff; }
th,td { padding:10px; border-bottom:1px solid #ddd; }
th { background:#eee; text-align:left; }
.section { margin-bottom:40px; }
.delete-btn { cursor:pointer; color:red; }
.submit-btn { background:#28a745; color:white; padding:10px 20px; border:none; border-radius:6px; cursor:pointer; }
</style>
</head>

<body>

<header>
  <nav class="navbar">
    <h2>iC42 Toxicology</h2>
    <div>
      <a href="backend.html" style="color:white;">Home</a>
      <a href="login.html" style="color:white;margin-left:10px;">Logout</a>
    </div>
  </nav>
</header>



<div class="container">

<h2>Approve Result (Req: <span id="reqLabel"></span>)</h2>

<div class="section">
  <h3>Targeted</h3>
  <table>
    <thead><tr><th>Drug</th><th>Value</th><th>Delete</th></tr></thead>
    <tbody id="targetedBody"></tbody>
  </table>
</div>

<div class="section">
  <h3>Untargeted</h3>
  <table>
    <thead><tr><th>Drug</th><th>Value</th><th>Delete</th></tr></thead>
    <tbody id="untargetedBody"></tbody>
  </table>
</div>



<div style="text-align:center;">
  <button class="submit-btn" onclick="submitReport()">View Report</button>
</div>

<h3 style="margin-top:40px;">Generated Report</h3>
<iframe 
  id="reportViewer" 
  style="width:100%; height:600px; border:1px solid #ccc; background:white;">
</iframe>

</div> <!-- container closes HERE -->

<script>
const API = "https://tox-backend-prg1.onrender.com";

const req = new URLSearchParams(window.location.search).get("req");
document.getElementById("reqLabel").textContent = req;

const rows = { targeted: [], untargeted: [] };

// LOAD FILES
async function loadFiles() {
  try {
    const res = await fetch(`${API}/api/files-by-req?req=${encodeURIComponent(req)}`);
    if (!res.ok) throw new Error("Failed to fetch file list");

    const files = await res.json();

    for (const f of files) {
      const fileRes = await fetch(
        `${API}/api/get-file?id=${f.record_id}&source=${f.source}`
      );

      if (!fileRes.ok) continue;

      const blob = await fileRes.blob();

      // ✅ HANDLE CSV
      if (f.file.toLowerCase().endsWith(".csv")) {
        const text = await blob.text();
        parseCSV(text, f.source);
      }

      // ✅ HANDLE EXCEL
      else if (f.file.toLowerCase().endsWith(".xlsx")) {
        const buffer = await blob.arrayBuffer();
        const workbook = XLSX.read(buffer, { type: "array" });

        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const csv = XLSX.utils.sheet_to_csv(sheet);

        parseCSV(csv, f.source);
      }

      else {
        console.log("Skipping unsupported file:", f.file);
      }
    }

  } catch (err) {
    console.error("LOAD ERROR:", err);
  }
}

// ROUTER
function parseCSV(csv, source) {
  if (source === "targeted") parseTargeted(csv);
  else parseUntargeted(csv);
}

// TARGETED
function parseTargeted(csv) {
  const lines = csv.replace(/\r/g, "").split("\n").filter(Boolean);
  if (lines.length < 2) return;

  const headers = lines[0].split(",");
  const values = lines[1].split(",");

  for (let i = 2; i < headers.length; i += 2) {
    const drug = headers[i]?.trim();
    const val = values[i]?.trim();
    const result = values[i + 1]?.trim();

    if (!drug || !val || result?.toLowerCase() !== "pass") continue;

    addRow("targeted", drug, val);
  }
}

// UNTARGETED
function parseUntargeted(csv) {
  const lines = csv.replace(/\r/g, "").split("\n").filter(Boolean);
  if (lines.length < 2) return;

  const headers = lines[0].split(",");

  // 🔍 Find column indexes dynamically
  const nameIndex = headers.findIndex(h => h.trim().toLowerCase() === "name");
  const valueIndex = headers.length - 1; // last column

  if (nameIndex === -1) {
    console.error("Name column not found");
    return;
  }

  for (let r = 1; r < lines.length; r++) {
    const cols = lines[r].split(",");

    const drug = cols[nameIndex]?.trim();
    const val = cols[valueIndex]?.trim();

    // skip empty or invalid values
    if (!drug || !val || val === "0" || val.toLowerCase() === "nan") continue;

    addRow("untargeted", drug, val);
  }
}

// ADD ROW
function addRow(source, drug, val) {
  const table = document.getElementById(source + "Body");

  rows[source].push({ drug, val });

  const tr = document.createElement("tr");
  tr.innerHTML = `
    <td>${drug}</td>
    <td>${val}</td>
    <td><span class="delete-btn" onclick="deleteRow(this, '${drug}', '${source}')">🗑</span></td>
  `;

  table.appendChild(tr);
}

// DELETE ROW
function deleteRow(el, drug, source) {
  el.closest("tr").remove();
  rows[source] = rows[source].filter(r => r.drug !== drug);
}

// SUBMIT PDF
async function submitReport() {
  if (!req) {
    alert("Missing requisition number");
    return;
  }

  console.log("Viewing report for req:", req);

  try {
    const res = await fetch(
      `${API}/api/generate-report?req=${encodeURIComponent(req)}`
    );

    if (!res.ok) {
      const err = await res.json();
      alert(err.error || "Failed to generate report");
      return;
    }

    const blob = await res.blob();

    // 🔥 Convert to URL and display
    const url = URL.createObjectURL(blob);

    document.getElementById("reportViewer").src = url;

  } catch (e) {
    console.error("ERROR:", e);
    alert("Error generating report");
  }
}


// INIT
loadFiles();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>File Viewer - iC42 Toxicology</title>
<link rel="stylesheet" href="style.css">

<style>
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
  background: white;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #ddd;
}

th {
  background: #f5f5f5;
  text-align: left;
}

tr:hover {
  background: #f9f9f9;
}

.delete-btn {
  cursor: pointer;
  color: red;
  font-weight: bold;
  font-size: 18px;
}

.delete-btn:hover {
  opacity: 0.7;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<header>
  <nav class="navbar">
    <h2 class="logo">iC42 Toxicology</h2>
  </nav>
</header>

<!-- BACK LINK -->
<section class="home-bar">
  <div class="container">
    <a href="results_approval.html">← Back to Results</a>
  </div>
</section>

<main class="container">

<h2>Drug Result</h2>

<table>
  <thead>
    <tr>
      <th>Drug</th>
      <th>Value</th>
      <th>Delete</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

</main>

<script>
console.log("JS LOADED");

const urlParams = new URLSearchParams(window.location.search);
const recordId = urlParams.get("id");

// LOAD FILE FROM BACKEND
async function loadFile() {
  if (!recordId) {
    alert("Missing record ID");
    return;
  }

  try {
    const res = await fetch(`http://127.0.0.1:5000/api/get-file?id=${recordId}`);

    if (!res.ok) {
      throw new Error("Failed to fetch file");
    }

    const text = await res.text();
    parseCSV(text);

  } catch (err) {
    console.error("Error loading file:", err);
    alert("Error loading file");
  }
}

// PARSE CSV
function parseCSV(csv) {
  const rows = csv.replace(/\r/g, "").split("\n");

  if (rows.length < 2) return;

  const delimiter = ",";
  const header = rows[0].split(delimiter);
  const values = rows[1].split(delimiter);

  const table = document.getElementById("tableBody");
  table.innerHTML = "";

  // Start AFTER metadata columns (first 2 columns)
  for (let i = 2; i < header.length; i += 2) {

    const drug = header[i]?.trim();
    const concentration = values[i]?.trim();
    const result = values[i + 1]?.trim();

    // Skip invalid
    if (!drug || !concentration || !result) continue;

    // 🔥 ONLY PASS
    if (result.toLowerCase() !== "pass") continue;

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${drug}</td>
      <td>${concentration}</td>
      <td><span class="delete-btn" onclick="deleteRow(this)">🗑</span></td>
    `;

    table.appendChild(tr);
  }

  // Optional: show message if nothing passed
  if (table.innerHTML === "") {
    table.innerHTML = "<tr><td colspan='3'>No passing results</td></tr>";
  }
}
function deleteRow(el) {
  if (!confirm("Remove this row?")) return;
  el.closest("tr").remove();
}

// INIT
loadFile();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Login - iC42 Toxicology</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<header>

  <nav class="navbar">

    <h2 class="logo">
      iC42 Toxicology
    </h2>

    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="reports.html">Reports</a>
      <a href="about.html">About</a>
      <a href="drug_dictionary.html">Drug Dictionary</a>
      <a href="contacts.html">Contact</a>
      <a href="login.html">Login</a>
    </div>

  </nav>

</header>

<main>

  <!-- HERO -->
  <section class="hero">

    <div class="hero-text">
      <h1>Login</h1>
      <p>Access secure laboratory reports</p>
    </div>

  </section>

  <!-- LOGIN FORM -->
  <section class="content">

    <div class="container">

      <form id="loginForm"
            class="card"
            style="max-width:400px; margin:auto;">

        <h3 style="margin-bottom:20px;">
          User Login
        </h3>

        <input type="text"
               id="username"
               name="username"
               placeholder="Username"
               autocomplete="username"
               required>

        <br><br>

        <input type="password"
               id="password"
               name="password"
               placeholder="Password"
               autocomplete="current-password"
               required>

        <br><br>

        <button type="submit"
                class="btn">
          Login
        </button>

        <p id="error"
           style="color:red; margin-top:10px;">
        </p>

      </form>

    </div>

  </section>

</main>

<!-- FOOTER -->
<footer class="footer">

  <div class="footer-content">
    <h2>iC42 Toxicology Laboratory</h2>
  </div>

</footer>

<script>

const API = "https://tox-backend-prg1.onrender.com";

document
  .getElementById("loginForm")
  .addEventListener("submit", login);

async function login(event) {

  event.preventDefault();

  const user =
    document.getElementById("username")
      .value
      .trim();

  const pass =
    document.getElementById("password")
      .value;

  const errorEl =
    document.getElementById("error");

  errorEl.innerText = "";

  try {

    const res = await fetch(
      `${API}/api/login`,
      {
        method: "POST",

        credentials: "include",

        headers: {
          "Content-Type": "application/json"
        },

        body: JSON.stringify({
          username: user,
          password: pass
        })
      }
    );

    const data = await res.json();

    if (!res.ok) {

      errorEl.innerText =
        data.error || "Invalid login";

      return;
    }

    window.location.href = "backend.html";

  } catch (e) {

    console.error(e);

    errorEl.innerText =
      "Server error";
  }
}

</script>

</body>
</html>

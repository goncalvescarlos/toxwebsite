<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - iC42 Toxicology</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<header>
  <nav class="navbar">
    <h2 class="logo">iC42 Toxicology</h2>

    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="reports.html">Reports</a>
      <a href="about.html">About</a>
      <a href="drug_dictionary.html">Drug Dictionary</a>
     
      <a href="contacts.html">Contact</a>
      <a href="login.html">Login</a>
    </div>
  </nav>
</header>

<main>

<!-- HERO -->
<section class="hero">
  <div class="hero-text">
    <h1>Login</h1>
    <p>Access secure laboratory reports</p>
  </div>
</section>

<!-- LOGIN FORM -->
<section class="content">
  <div class="container">

    <div class="card" style="max-width:400px; margin:auto;">

      <h3 style="margin-bottom:20px;">User Login</h3>

      <input type="text" id="username" placeholder="Username"><br><br>
      <input type="password" id="password" placeholder="Password"><br><br>

      <button class="btn" onclick="login()">Login</button>

      <p id="error" style="color:red; margin-top:10px;"></p>

    </div>

  </div>
</section>

</main>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-content">
    <h2>iC42 Toxicology Laboratory</h2>
  </div>
</footer>


<script>

const API = "https://tox-backend-prg1.onrender.com";

async function login() {

  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  document.getElementById("error").innerText = "";

  try {

    const res = await fetch(`${API}/api/login`, {

      method: "POST",

      credentials: "include",

      headers: {
        "Content-Type": "application/json"
      },

      body: JSON.stringify({
        username: user,
        password: pass
      })

    });

    const data = await res.json();

    if (!res.ok) {

      document.getElementById("error").innerText =
        data.error || "Invalid login";

      return;
    }

    window.location.href = "backend.html";

  } catch (e) {

    console.error(e);

    document.getElementById("error").innerText =
      "Server error";
  }
}

</script>

</body>
</html>

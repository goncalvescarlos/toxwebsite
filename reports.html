<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports - iC42 Toxicology</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<header>
  <nav class="navbar">
    <h2 class="logo">iC42 Toxicology</h2>

    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="reports.html">Reports</a>
      <a href="about.html">About</a>
      <a href="drug_dictionary.html">Drug Dictionary</a>
      <a href="publications.html">Publications</a>
      <a href="contacts.html">Contact</a>
    </div>
  </nav>
</header>

<main>

<!-- HERO -->
<section class="hero">
  <div class="hero-text">
    <h1>Access Reports</h1>
    <p>Enter your Sample ID to retrieve your results.</p>
  </div>

  <div class="hero-image">
    <img src="lab.png" alt="Laboratory">
  </div>
</section>

<!-- SEARCH SECTION -->
<section class="intro">

  <h2>Search for Your Report</h2>

  <form id="searchForm">
    <input 
      type="text" 
      id="sampleID" 
      placeholder="Enter Sample ID (e.g., IC42-12345)" 
      required
    >
    <br><br>

    <button type="submit" class="btn">Search</button>
  </form>

</section>

</main>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-container">

    <div class="footer-text">
      <h2>iC42 Toxicology Laboratory</h2>

      <h3>CU Anschutz</h3>

      <p>
        iC42 Toxicology Lab<br>
        12705 East Montview Boulevard<br>
        Bioscience II, Suite 200<br>
        Aurora, CO 80045
      </p>
    </div>

    <div class="footer-images">
      <img src="cap-accredited-logo-700x302.png" alt="CAP Accredited">
      <img src="clia-certified-700x302.png" alt="CLIA Certified">
    </div>

  </div>

  <hr>
</footer>

<!-- JAVASCRIPT -->
<script>
document.getElementById("searchForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const sampleID = document.getElementById("sampleID").value.trim();

  // 🔴 REPLACE THIS WITH YOUR REAL REDCAP LINK
  const baseURL = "https://YOUR-REDCAP-SURVEY-LINK";

  // Example: passing sample ID as parameter
  const fullURL = baseURL + "?sample_id=" + encodeURIComponent(sampleID);

  // Redirect user
  window.location.href = fullURL;
});
</script>

</body>
</html>

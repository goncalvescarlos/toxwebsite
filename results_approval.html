<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Approve Results</title>
<link rel="stylesheet" href="style.css">

<style>
.table-container {
  max-width: 1100px;
  margin: 40px auto;
}

.table-header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 15px;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #ddd;
}

th {
  background: #f5f5f5;
  text-align: left;
}

tr:hover {
  background: #f9f9f9;
}

.action-icons {
  display: flex;
  gap: 10px;
  cursor: pointer;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<header>
  <nav class="navbar">
    <h2 class="logo">iC42 Toxicology</h2>
    <div class="nav-links">
      <a href="backend.html">Home</a>
      <a href="login.html">Logout</a>
    </div>
  </nav>
</header>

<!-- HOME BAR -->
<section class="home-bar">
  <div class="container">
    <a href="backend.html">← Back to Dashboard</a>
  </div>
</section>

<main>

<div class="table-container">

  <h2>Approve Results</h2>
  <p>User must approve results uploaded by another user.</p>

  <!-- FILTER -->
  <div class="table-header">
    <div>
      Filter: <input type="text" id="filterInput">
    </div>
    <button class="btn">Delete</button>
  </div>

  <!-- TABLE -->
  <table id="resultsTable">
    <thead>
      <tr>
        <th><input type="checkbox"></th>
        <th>Req #</th>
        <th>Patient</th>
        <th>Patient ID</th>
        <th>Clinic</th>
        <th>Specimen</th>
        <th>Uploaded</th>
        <th>Uploaded By</th>
        <th>Actions</th>
      </tr>
    </thead>

    <tbody id="tableBody">
      <!-- DATA WILL LOAD HERE -->
    </tbody>

  </table>

</div>

</main>

<script>
/* TEMP MOCK DATA (replace with REDCap later) */
const data = [
  {
    id: "92449",
    patient: "Alberts, Stephanie",
    patientId: "14362",
    clinic: "Potomac Street Center",
    specimen: "Urine",
    date: "4/22/2026",
    user: "Trenton Deanna"
  },
  {
    id: "92450",
    patient: "Almodovar, Jose",
    patientId: "7854",
    clinic: "Potomac Street Center",
    specimen: "Urine",
    date: "4/22/2026",
    user: "Trenton Deanna"
  }
];

/* RENDER TABLE */
function renderTable() {
  const body = document.getElementById("tableBody");
  body.innerHTML = "";

  data.forEach(row => {
    body.innerHTML += `
      <tr>
        <td><input type="checkbox"></td>
        <td>${row.id}</td>
        <td>${row.patient}</td>
        <td>${row.patientId}</td>
        <td>${row.clinic}</td>
        <td>${row.specimen}</td>
        <td>${row.date}</td>
        <td>${row.user}</td>
        <td class="action-icons">
          ✔ ✏ 🗑
        </td>
      </tr>
    `;
  });
}

renderTable();
</script>

</body>
</html>

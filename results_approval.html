<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Approve Results - iC42 Toxicology</title>
<link rel="stylesheet" href="style.css">

<style>
  .table-container {
    max-width: 1100px;
    margin: 40px auto;
  }

  .table-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
    gap: 10px;
  }

  .table-header input {
    padding: 6px 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
  }

  th, td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
  }

  th {
    background: #f5f5f5;
    text-align: left;
  }

  tr:hover {
    background: #f9f9f9;
  }

  .action-btn {
    padding: 6px 10px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }

  .view-btn {
    background: #0b3c6f;
    color: #fff;
  }

  .view-btn:hover {
    opacity: 0.9;
  }

  #fileViewer {
    margin-top: 25px;
    padding: 15px;
    background: #fff;
    border: 1px solid #ddd;
    white-space: pre-wrap;
    font-family: monospace;
    max-height: 400px;
    overflow: auto;
  }
</style>

</head>

<body>

<!-- NAVBAR -->
<header>
  <nav class="navbar">
    <h2 class="logo">iC42 Toxicology</h2>
    <div class="nav-links">
      <a href="backend.html">Home</a>
      <a href="login.html">Logout</a>
    </div>
  </nav>
</header>

<!-- HOME BAR -->
<section class="home-bar">
  <div class="container">
    <a href="backend.html">← Back to Dashboard</a>
  </div>
</section>

<main>

<div class="table-container">

  <h2>Approve Results</h2>
  <p>Each row represents one record with an attached results file.</p>

  <!-- FILTER -->
  <div class="table-header">
    <div>
      Filter: <input type="text" id="filterInput" placeholder="Search by ID..." onkeyup="filterTable()">
    </div>
    <button class="btn">Delete</button>
  </div>

  <!-- TABLE -->
  <table id="resultsTable">
    <thead>
      <tr>
        <th><input type="checkbox"></th>
        <th>ID</th>
        <th>File</th>
        <th>Actions</th>
      </tr>
    </thead>

    <tbody id="tableBody"></tbody>
  </table>

  <!-- FILE VIEWER -->
  <div id="fileViewer">Select a record to view its CSV content.</div>

</div>

</main>

<script>
let records = [];

// ===== LOAD RECORDS FROM FLASK =====
async function loadRecords() {
  try {
    const res = await fetch("http://127.0.0.1:5000/api/records");
    const data = await res.json();

    records = data;
    renderTable(records);

  } catch (err) {
    console.error("Error loading records:", err);
  }
}

// ===== RENDER TABLE =====
function renderTable(data) {
  const body = document.getElementById("tableBody");
  body.innerHTML = "";

  data.forEach(row => {
    body.innerHTML += `
      <tr>
        <td><input type="checkbox"></td>
        <td>${row.id}</td>
        <td>${row.file}</td>
        <td>
          <button class="action-btn view-btn" onclick="loadFile('${row.id}')">
            View
          </button>
        </td>
      </tr>
    `;
  });
}

// ===== FILTER TABLE =====
function filterTable() {
  const value = document.getElementById("filterInput").value.toLowerCase();

  const filtered = records.filter(r =>
    r.id.toLowerCase().includes(value)
  );

  renderTable(filtered);
}

// ===== LOAD CSV FILE =====
async function loadFile(recordId) {
  try {
    const res = await fetch(`http://127.0.0.1:5000/api/get-file?id=${recordId}`);
    const text = await res.text();

    document.getElementById("fileViewer").innerText = text;

  } catch (err) {
    console.error("Error loading file:", err);
  }
}

// ===== INIT =====
window.onload = loadRecords;
</script>

</body>
</html>

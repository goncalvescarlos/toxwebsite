<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pprove Results - iC42 Toxicology</title>
<link rel="stylesheet" href="style.css">

<style>
.table-container {
  max-width: 1100px;
  margin: 40px auto;
}

.table-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 15px;
  gap: 10px;
}

.table-header input {
  padding: 6px 10px;
  border: 1px solid #ccc;
  border-radius: 4px;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: #fff;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #ddd;
  vertical-align: top;
}

th {
  background: #f5f5f5;
  text-align: left;
}

tr:hover {
  background: #f9f9f9;
}

.file-item {
  margin-bottom: 6px;
}

.action-btn {
  padding: 4px 8px;
  border-radius: 4px;
  text-decoration: none;
  font-size: 12px;
}

.view-btn {
  background: #0b3c6f;
  color: #fff;
  margin-left: 8px;
}

.view-btn:hover {
  opacity: 0.9;
}
</style>

</head>

<body>

<header>
  <nav class="navbar">
    <h2 class="logo">iC42 Toxicology</h2>
    <div class="nav-links">
      <a href="backend.html">Home</a>
      <a href="login.html">Logout</a>
    </div>
  </nav>
</header>

<section class="home-bar">
  <div class="container">
    <a href="backend.html">← Back to Dashboard</a>
  </div>
</section>

<main>
<div class="table-container">

  <h2>Approve Result</h2>

  <div class="table-header">
    <div>
      Filter:
      <input type="text" id="filterInput" placeholder="Search by Req #" onkeyup="filterTable()">
    </div>
    <button class="btn">Delete</button>
  </div>

  <table id="resultsTable">
    <thead>
      <tr>
        <th><input type="checkbox"></th>
        <th>Req #</th>
        <th>File</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

</div>
</main>

<script>
let records = [];

// LOAD RECORDS
async function loadRecords() {
  try {
    const res = await fetch("https://tox-backend-prg1.onrender.com/api/records");
    const data = await res.json();

    records = data || [];
    renderTable(records);

  } catch (err) {
    console.error("Error loading records:", err);
  }
}

// RENDER TABLE (GROUPED BY REQ)
function renderTable(data) {
  const body = document.getElementById("tableBody");
  body.innerHTML = "";

  const grouped = {};

  data.forEach(r => {
    const reqs = (r.req || "").split(",").map(x => x.trim());

    reqs.forEach(req => {
      if (!grouped[req]) {
        grouped[req] = [];
      }
      grouped[req].push(r);
    });
  });

  Object.keys(grouped).forEach(req => {
    const rows = grouped[req];

    const tr = document.createElement("tr");

    // 🔹 FILE LIST (NO BUTTON HERE)
    const fileList = rows.map(r => `
      <div class="file-item">
        ${r.file}
      </div>
    `).join("");

    // 🔹 SINGLE BUTTON (use first record as reference OR pass req)
    const first = rows[0];

    tr.innerHTML = `
      <td><input type="checkbox"></td>
      <td>${req}</td>
      <td>${fileList}</td>
      <td>
        <a href="file_viewer.html?req=${encodeURIComponent(req)}"
           class="action-btn view-btn">
           View
        </a>
      </td>
    `;

    body.appendChild(tr);
  });
}

// FILTER TABLE
function filterTable() {
  const value = document.getElementById("filterInput").value.toLowerCase().trim();

  const filtered = records.filter(r =>
    (r.req || "").toLowerCase().includes(value)
  );

  renderTable(filtered);
}

// INIT
window.onload = loadRecords;
</script>

</body>
</html>

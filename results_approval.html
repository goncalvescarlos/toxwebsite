<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Approve Results - iC42 Toxicology</title>
<link rel="stylesheet" href="style.css">

<style>
.table-container {
  max-width: 1100px;
  margin: 40px auto;
}

.table-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 15px;
  gap: 10px;
}

.table-header input {
  padding: 6px 10px;
  border: 1px solid #ccc;
  border-radius: 4px;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: #fff;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #ddd;
}

th {
  background: #f5f5f5;
  text-align: left;
}

tr:hover {
  background: #f9f9f9;
}

.action-btn {
  padding: 6px 10px;
  border-radius: 4px;
  text-decoration: none;
}

.view-btn {
  background: #0b3c6f;
  color: #fff;
}

.view-btn:hover {
  opacity: 0.9;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<header>
  <nav class="navbar">
    <h2 class="logo">iC42 Toxicology</h2>
    <div class="nav-links">
      <a href="backend.html">Home</a>
      <a href="login.html">Logout</a>
    </div>
  </nav>
</header>

<!-- HOME BAR -->
<section class="home-bar">
  <div class="container">
    <a href="backend.html">← Back to Dashboard</a>
  </div>
</section>

<main>

<div class="table-container">

  <h2>pprove esults</h2>

  <!-- FILTER -->
  <div class="table-header">
    <div>
      Filter:
      <input type="text" id="filterInput" placeholder="Search by ID..." onkeyup="filterTable()">
    </div>
    <button class="btn">Delete</button>
  </div>

  <!-- TABLE -->
  <table id="resultsTable">
    <thead>
      <tr>
        <th><input type="checkbox"></th>
        <th>ID</th>
        <th>File</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

</div>

</main>

<script>
let records = [];

// LOAD RECORDS FROM FLASK
async function loadRecords() {
  try {
    const res = await fetch("http://127.0.0.1:5000/api/records");
    const data = await res.json();

    records = data || [];
    renderTable(records);

  } catch (err) {
    console.error("Error loading records:", err);
  }
}

// RENDER TABLE
function renderTable(data) {
  const body = document.getElementById("tableBody");
  body.innerHTML = "";

  data.forEach(row => {
  const recordId = row.record_id;   // correct backend key
  const req = row.req || "";        // display
  const file = row.file || "";

  const tr = document.createElement("tr");

  tr.innerHTML = `
    <td><input type="checkbox"></td>
    <td>${req}</td>
    <td>${file}</td>
    <td>
      <a href="file_viewer.html?id=${encodeURIComponent(recordId)}"
         class="action-btn view-btn">
        View
      </a>
    </td>
  `;

  body.appendChild(tr);
});
}

// FILTER TABLE
function filterTable() {
  const value = document.getElementById("filterInput").value.toLowerCase().trim();

  const filtered = records.filter(r =>
    (r.id || "").toLowerCase().includes(value)
  );

  renderTable(filtered);
}

// INIT
window.onload = loadRecords;
</script>

</body>
</html>
